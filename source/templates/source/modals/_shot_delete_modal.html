<div class="modal fade" id="shotDeleteLinesModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">
          <i class="fas fa-triangle-exclamation me-2"></i>
          Confirm delete
        </h5>
        <button type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="text-center mb-3">
          <div class="display-6 text-danger mb-2">
            <i class="fas fa-trash-can"></i>
          </div>

          <h6 class="fw-bold mb-2">Delete selected SHOT lines?</h6>

          <p class="text-muted mb-2">
            This will delete selected lines from <strong>SHOT_TABLE</strong>
            and from the line summary table.
          </p>

          <div class="alert alert-warning mb-0">
            Selected: <strong id="shot-delete-lines-count">0</strong> line(s)
          </div>
        </div>

        <div id="shot-delete-lines-preview" class="small text-muted"></div>
      </div>

      <div class="modal-footer">
        <button type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal">
          Cancel
        </button>

        <button type="button"
                class="btn btn-danger"
                id="shot-confirm-delete-button">
          <i class="fas fa-trash-can me-2"></i>
          Yes, delete
        </button>
      </div>
    </div>
  </div>
</div>
