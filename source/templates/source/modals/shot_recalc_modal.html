<div class="modal fade" id="shotRecalcLinesModal" tabindex="-1" aria-labelledby="shotRecalcLinesModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header bg-warning-subtle border-0">
                <h5 class="modal-title fw-bold" id="shotRecalcLinesModalLabel">
                    <i class="fa-solid fa-rotate me-2"></i>
                    Recalculate selected lines
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <p class="mb-2">
                    You are about to recalculate
                    <strong id="shot-recalc-lines-count">0</strong>
                    selected line(s).
                </p>

                <div id="shot-recalc-lines-preview" class="small text-secondary mb-3"></div>

                <div class="alert alert-warning mb-0 rounded-3">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    SHOT line summary will be rebuilt for the selected lines only.
                </div>
            </div>

            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light rounded-pill px-3" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="button" class="btn btn-warning rounded-pill px-4" id="shot-confirm-recalc-button">
                    <i class="fa-solid fa-rotate me-2"></i>
                    Recalculate
                </button>
            </div>
        </div>
    </div>
</div>
