<!-- DELETE SPS CONFIRM MODAL -->
<div class="modal fade" id="spsDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-triangle-exclamation me-2 text-danger"></i>
          Delete SPS records
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="alert alert-warning mb-0">
          You are about to delete <b id="sps-delete-count">0</b> selected SPS record(s).
          <br>
          This action cannot be undone.
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          No
        </button>
        <button type="button" class="btn btn-danger" id="sps-confirm-delete-btn">
          <i class="fas fa-trash-can me-2"></i>Yes, delete
        </button>
      </div>
    </div>
  </div>
</div>
