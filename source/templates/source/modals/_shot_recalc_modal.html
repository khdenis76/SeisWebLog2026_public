<div class="modal fade" id="shotRecalcLinesModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">
          <i class="fas fa-rotate me-2"></i>
          Confirm recalculation
        </h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="text-center mb-3">
          <div class="display-6 text-warning mb-2">
            <i class="fas fa-rotate"></i>
          </div>

          <h6 class="fw-bold mb-2">Recalculate selected SHOT lines?</h6>

          <p class="text-muted mb-2">
            This will rebuild selected line summaries from <strong>SHOT_TABLE</strong>
            and compare them again with <strong>SPSolution</strong>.
          </p>

          <div class="alert alert-warning mb-0">
            Selected: <strong id="shot-recalc-lines-count">0</strong> line(s)
          </div>
        </div>

        <div id="shot-recalc-lines-preview" class="small text-muted"></div>
      </div>

      <div class="modal-footer">
        <button type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal">
          Cancel
        </button>

        <button type="button"
                class="btn btn-warning"
                id="shot-confirm-recalc-button">
          <i class="fas fa-rotate me-2"></i>
          Yes, recalculate
        </button>
      </div>
    </div>
  </div>
</div>
