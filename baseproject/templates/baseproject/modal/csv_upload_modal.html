<div class="modal fade seis-modal" id="csvuploadModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <span class="seis-chip"><i class="fas fa-file-csv"></i> Layer import</span>
          New layer from CSV file
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <form id="csv-load-form" method="post" action="{% url 'upload_csv_layer_ajax' %}">
          <div class="seis-section">
            <div class="seis-section-head">
              <h6 class="seis-section-title"><span class="seis-dot"></span> File and coordinates</h6>
            </div>
            <div class="seis-section-body row g-3">
              <div class="col-12">
                <label for="csvFileInput" class="form-label">CSV file</label>
                <input id="csvFileInput" class="form-control" type="file" accept=".csv" name="csv_file" data-headers-url="{% url 'csv_headers' %}">
              </div>
              <div class="col-md-6">
                <label for="layer-name" class="form-label">Layer name</label>
                <input id="layer-name" name="layer_name" class="form-control">
              </div>
              <div class="col-md-6">
                <label for="selPointName" class="form-label">Point name</label>
                <select id="selPointName" name="pointfield" class="form-select form-control"></select>
              </div>
              <div class="col-md-4">
                <label for="selX" class="form-label">X coordinate (Easting)</label>
                <select id="selX" name="xfield" class="form-select"></select>
              </div>
              <div class="col-md-4">
                <label for="selY" class="form-label">Y coordinate (Northing)</label>
                <select id="selY" name="yfield" class="form-select"></select>
              </div>
              <div class="col-md-4">
                <label for="selZ" class="form-label">Z coordinate (Elevation)</label>
                <select id="selZ" name="zfield" class="form-select"></select>
              </div>
            </div>
          </div>

          <div class="seis-section mt-3">
            <div class="seis-section-head">
              <h6 class="seis-section-title"><span class="seis-dot"></span> Attribute mapping</h6>
            </div>
            <div class="seis-section-body row g-3">
              <div class="col-md-4">
                <label for="attr1-name" class="form-label">Name for Attr. I</label>
                <input id="attr1-name" name="attr1_name" value="Attribute One" class="form-control">
                <label for="attr1" class="form-label mt-2">Attribute column</label>
                <select id="attr1" name="attr1" class="form-select"></select>
              </div>
              <div class="col-md-4">
                <label for="attr2-name" class="form-label">Name for Attr. II</label>
                <input id="attr2-name" name="attr2_name" value="Attribute Two" class="form-control">
                <label for="attr2" class="form-label mt-2">Attribute column</label>
                <select id="attr2" name="attr2" class="form-select"></select>
              </div>
              <div class="col-md-4">
                <label for="attr3-name" class="form-label">Name for Attr. III</label>
                <input id="attr3-name" name="attr3_name" value="Attribute Three" class="form-control">
                <label for="attr3" class="form-label mt-2">Attribute column</label>
                <select id="attr3" name="attr3" class="form-select"></select>
              </div>
              <div class="col-12">
                <label for="comments" class="form-label">Description</label>
                <input id="comments" name="comments" value="N/A" class="form-control">
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary seis-btn-soft" data-bs-dismiss="modal">Cancel</button>
        <button id="btnSaveCsv" type="button" class="btn seis-btn-primary">Save layer</button>
      </div>
    </div>
  </div>
</div>
