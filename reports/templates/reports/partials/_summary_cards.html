<div class="cards-grid">
    <div class="metric-card">
        <div class="metric-label">Deployed Nodes</div>
        <div class="metric-value">{{ payload.summary.deployed_nodes }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Recovered Nodes</div>
        <div class="metric-value">{{ payload.summary.recovered_nodes }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Shot Count</div>
        <div class="metric-value">{{ payload.summary.shot_count }}</div>
    </div>
    <div class="metric-card">
        <div class="metric-label">Active Lines</div>
        <div class="metric-value">{{ payload.summary.active_lines }}</div>
    </div>
</div>
