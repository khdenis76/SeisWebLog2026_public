<div class="card section-card">
    <h2>Charts</h2>
    <div class="media-grid">
        {% for key, url in payload.charts.items %}
            <div class="media-card">
                <h3>{{ key|title|cut:"_" }}</h3>
                <img src="{{ url }}" alt="{{ key }}">
            </div>
        {% empty %}
            <p class="muted">No chart images available for this period.</p>
        {% endfor %}
    </div>
</div>
