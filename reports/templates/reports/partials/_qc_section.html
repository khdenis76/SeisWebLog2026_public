<section class="swl-card">
  <div class="swl-card-header"><h2>QC Summary</h2></div>
  <div class="swl-grid swl-grid-2">
    <div class="swl-card swl-inner-card">{{ payload.charts.battery_histogram.html|safe }}</div>
    <div class="swl-card swl-inner-card">{{ payload.charts.radial_offset_histogram.html|safe }}</div>
  </div>
  <div class="swl-grid swl-grid-2">
    <div class="swl-card swl-inner-card"><h3>Battery Life</h3><p class="swl-muted">Average: {{ payload.metrics.qc.battery_avg|default:"N/A" }}</p></div>
    <div class="swl-card swl-inner-card"><h3>Radial Offset from Preplot</h3><p class="swl-muted">Average: {{ payload.metrics.qc.radial_avg|default:"N/A" }}</p></div>
  </div>
</section>
