{% extends "reports/base_report.html" %}
{% block content %}
<section class="swl-card">
  <h2>Delete Report</h2>
  <p>Are you sure you want to delete <strong>{{ report.title }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <div class="swl-toolbar">
      <button type="submit" class="swl-btn swl-btn-danger">Delete</button>
      <a class="swl-btn" href="{% url 'reports:detail' report.pk %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
